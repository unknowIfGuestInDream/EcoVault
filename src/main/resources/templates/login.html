<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:replace="~{fragments/common :: head('登录 - EcoVault')}"></head>
<body>
<div class="center-page">
    <div class="glass" style="max-width:400px; width:100%">
        <div style="position:absolute; top:20px; right:20px">
            <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
        </div>
        <h2>欢迎回来 👋</h2>
        <p class="muted">登录 EcoVault 管理你的数据</p>
        <form id="login-form" onsubmit="return false">
            <label for="username">用户名</label>
            <input id="username" name="username" autocomplete="username" required/>
            <label for="password">密码</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required/>
            <button class="btn" style="width:100%; margin-top:20px" onclick="doLogin()">登录</button>
        </form>
        <p class="muted" style="margin-top:16px; text-align:center">
            还没有账号？<a th:href="@{/register}">立即注册</a>
        </p>
    </div>
</div>
<script>
    async function doLogin() {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;
        if (!username || !password) {
            toast("请输入用户名和密码", "error");
            return;
        }
        try {
            const data = await api("/api/auth/login", {
                method: "POST",
                body: JSON.stringify({ username, password })
            });
            toast("登录成功，欢迎 " + data.nickname);
            setTimeout(() => (window.location.href = "/dashboard"), 600);
        } catch (e) {
            toast(e.message, "error");
        }
    }

    document.addEventListener("keydown", (e) => {
        if (e.key === "Enter") doLogin();
    });
</script>
</body>
</html>
