<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:replace="~{fragments/common :: head('密码管理 - EcoVault')}"></head>
<body>
<header th:replace="~{fragments/common :: navbar}"></header>
<div class="container">
    <div class="glass card">
        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px">
            <div>
                <h2>🔑 密码管理</h2>
                <p class="muted">列表默认仅显示脱敏密码，支持按需查看详情、显示明文与一键复制。</p>
            </div>
            <button class="btn" onclick="openModal()">➕ 新增条目</button>
        </div>
        <div class="row" style="margin-top:16px">
            <input id="search" placeholder="按标题搜索..." oninput="debouncedLoad()"/>
            <input id="tag" placeholder="按标签筛选..." oninput="debouncedLoad()"/>
        </div>
        <div id="list" style="margin-top:20px"></div>
    </div>
</div>

<!-- 新增/编辑弹窗 -->
<div class="modal-backdrop" id="modal">
    <div class="glass modal">
        <div class="modal-header">
            <h3 id="modal-title">新增密码条目</h3>
            <button class="icon-btn modal-close" onclick="closeModal()" type="button" aria-label="关闭">✕</button>
        </div>
        <input type="hidden" id="entry-id"/>
        <input type="hidden" id="f-category"/>
        <label>标题 *</label><input id="f-title"/>
        <label>账号</label><input id="f-account"/>
        <label>密码 *</label><input id="f-secret"/>
        <label>网址</label><input id="f-url"/>
        <label>标签（逗号分隔）</label><input id="f-tags"/>
        <label>备注</label><textarea id="f-notes" rows="3"></textarea>
        <div style="display:flex; gap:10px; margin-top:20px">
            <button class="btn" style="flex:1" onclick="saveEntry()">保存</button>
            <button class="btn secondary" style="flex:1" onclick="closeModal()">取消</button>
        </div>
    </div>
</div>

<!-- 详情弹窗 -->
<div class="modal-backdrop" id="detail-modal">
    <div class="glass modal">
        <div class="modal-header">
            <h3>密码详情</h3>
            <button class="icon-btn modal-close" onclick="closeDetailModal()" type="button" aria-label="关闭">✕</button>
        </div>
        <dl class="detail-grid">
            <div>
                <dt>标题</dt>
                <dd id="detail-title">-</dd>
            </div>
            <div>
                <dt>账号</dt>
                <dd id="detail-account">-</dd>
            </div>
            <div>
                <dt>密码</dt>
                <dd>
                    <div class="password-cell">
                        <code class="secret-value" id="detail-secret">******</code>
                        <button class="btn btn-sm secondary" id="detail-secret-toggle" onclick="toggleDetailSecret()" type="button">显示密码</button>
                        <button class="btn btn-sm secondary" onclick="copyDetailSecret()" type="button">复制</button>
                    </div>
                </dd>
            </div>
            <div>
                <dt>网址</dt>
                <dd id="detail-url">-</dd>
            </div>
            <div>
                <dt>标签</dt>
                <dd id="detail-tags">-</dd>
            </div>
            <div>
                <dt>创建时间</dt>
                <dd id="detail-created-at">-</dd>
            </div>
            <div>
                <dt>更新时间</dt>
                <dd id="detail-updated-at">-</dd>
            </div>
            <div class="detail-span">
                <dt>备注</dt>
                <dd id="detail-notes">-</dd>
            </div>
        </dl>
        <div style="display:flex; justify-content:flex-end; margin-top:20px">
            <button class="btn secondary" onclick="closeDetailModal()" type="button">关闭</button>
        </div>
    </div>
</div>

<script>
    const MASKED_SECRET = "******";
    const detailCache = new Map();
    const visibleSecrets = new Set();
    let currentDetail = null;
    let detailSecretVisible = false;
    let timer;

    function debouncedLoad() {
        clearTimeout(timer);
        timer = setTimeout(loadList, 300);
    }

    async function loadList() {
        const keyword = document.getElementById("search").value.trim();
        const tag = document.getElementById("tag").value.trim();
        const params = new URLSearchParams();
        if (keyword) params.append("keyword", keyword);
        if (tag) params.append("tag", tag);
        const data = await api("/api/passwords?" + params.toString());
        const list = document.getElementById("list");
        visibleSecrets.clear();
        if (!data.length) {
            list.innerHTML = '<p class="muted">暂无密码条目</p>';
            return;
        }
        list.innerHTML = `
            <table class="table password-table">
                <thead>
                    <tr>
                        <th>标题</th>
                        <th>账号</th>
                        <th>密码</th>
                        <th>网址</th>
                        <th>标签</th>
                        <th>更新时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    ${data.map((entry) => `
                        <tr>
                            <td>${escapeHtml(entry.title)}</td>
                            <td>${escapeHtml(entry.account || "-")}</td>
                            <td>
                                <div class="password-cell">
                                    <code class="secret-value" id="secret-${entry.id}">${escapeHtml(entry.secret || MASKED_SECRET)}</code>
                                    <button class="btn btn-sm secondary" id="toggle-secret-${entry.id}" onclick="toggleSecret(${entry.id})" type="button">显示密码</button>
                                    <button class="btn btn-sm secondary" onclick="copySecret(${entry.id})" type="button">复制</button>
                                </div>
                            </td>
                            <td>${renderUrl(entry.url)}</td>
                            <td>${renderTags(entry.tags)}</td>
                            <td>${escapeHtml(entry.updatedAt || "-")}</td>
                            <td>
                                <div class="table-actions">
                                    <button class="btn btn-sm secondary" onclick="viewEntry(${entry.id})" type="button">详情</button>
                                    <button class="btn btn-sm secondary" onclick="editEntry(${entry.id})" type="button">编辑</button>
                                    <button class="btn btn-sm danger" onclick="delEntry(${entry.id})" type="button">删除</button>
                                </div>
                            </td>
                        </tr>`).join("")}
                </tbody>
            </table>`;
    }

    function renderUrl(url) {
        if (!url) {
            return '<span class="muted">-</span>';
        }
        return `<a href="${escapeHtml(url)}" target="_blank" rel="noreferrer noopener">${escapeHtml(url)}</a>`;
    }

    function renderTags(tags) {
        if (!tags || !tags.length) {
            return '<span class="muted">-</span>';
        }
        return tags.map((tag) => `<span class="inline-tag">${escapeHtml(tag)}</span>`).join("");
    }

    async function loadEntry(id, forceReload = false) {
        if (!forceReload && detailCache.has(id)) {
            return detailCache.get(id);
        }
        const entry = await api("/api/passwords/" + id);
        detailCache.set(id, entry);
        return entry;
    }

    function openModal() {
        document.getElementById("modal-title").textContent = "新增密码条目";
        ["entry-id", "f-title", "f-account", "f-secret", "f-url", "f-category", "f-tags", "f-notes"]
            .forEach((id) => document.getElementById(id).value = "");
        document.getElementById("modal").classList.add("show");
    }

    async function editEntry(id) {
        try {
            const entry = await loadEntry(id);
            document.getElementById("modal-title").textContent = "编辑密码条目";
            document.getElementById("entry-id").value = entry.id;
            document.getElementById("f-title").value = entry.title || "";
            document.getElementById("f-account").value = entry.account || "";
            document.getElementById("f-secret").value = entry.secret || "";
            document.getElementById("f-url").value = entry.url || "";
            document.getElementById("f-category").value = entry.category || "";
            document.getElementById("f-tags").value = (entry.tags || []).join(",");
            document.getElementById("f-notes").value = entry.notes || "";
            document.getElementById("modal").classList.add("show");
        } catch (e) {
            toast(e.message, "error");
        }
    }

    function closeModal() {
        document.getElementById("modal").classList.remove("show");
    }

    async function saveEntry() {
        const id = document.getElementById("entry-id").value;
        const payload = {
            title: document.getElementById("f-title").value.trim(),
            account: document.getElementById("f-account").value.trim(),
            secret: document.getElementById("f-secret").value,
            url: document.getElementById("f-url").value.trim(),
            category: document.getElementById("f-category").value.trim(),
            notes: document.getElementById("f-notes").value,
            tags: document.getElementById("f-tags").value.split(",").map((tag) => tag.trim()).filter(Boolean)
        };
        if (!payload.title || !payload.secret) {
            toast("标题和密码必填", "error");
            return;
        }
        try {
            const saved = id
                ? await api("/api/passwords/" + id, { method: "PUT", body: JSON.stringify(payload) })
                : await api("/api/passwords", { method: "POST", body: JSON.stringify(payload) });
            if (saved && saved.id) {
                detailCache.set(saved.id, saved);
            }
            toast("保存成功");
            closeModal();
            await loadList();
        } catch (e) {
            toast(e.message, "error");
        }
    }

    async function toggleSecret(id) {
        const secretEl = document.getElementById("secret-" + id);
        const buttonEl = document.getElementById("toggle-secret-" + id);
        if (!secretEl || !buttonEl) {
            return;
        }
        if (visibleSecrets.has(id)) {
            visibleSecrets.delete(id);
            secretEl.textContent = MASKED_SECRET;
            buttonEl.textContent = "显示密码";
            return;
        }
        try {
            const entry = await loadEntry(id);
            visibleSecrets.add(id);
            secretEl.textContent = entry.secret || "";
            buttonEl.textContent = "隐藏密码";
        } catch (e) {
            toast(e.message, "error");
        }
    }

    async function copySecret(id) {
        try {
            const entry = await loadEntry(id);
            await copyText(entry.secret || "");
            toast("密码已复制");
        } catch (e) {
            toast(e.message, "error");
        }
    }

    async function viewEntry(id) {
        try {
            const entry = await loadEntry(id);
            currentDetail = entry;
            detailSecretVisible = false;
            document.getElementById("detail-title").textContent = entry.title || "-";
            document.getElementById("detail-account").textContent = entry.account || "-";
            document.getElementById("detail-secret").textContent = MASKED_SECRET;
            document.getElementById("detail-secret-toggle").textContent = "显示密码";
            document.getElementById("detail-url").innerHTML = renderUrl(entry.url);
            document.getElementById("detail-tags").innerHTML = renderTags(entry.tags);
            document.getElementById("detail-created-at").textContent = entry.createdAt || "-";
            document.getElementById("detail-updated-at").textContent = entry.updatedAt || "-";
            document.getElementById("detail-notes").textContent = entry.notes || "-";
            document.getElementById("detail-modal").classList.add("show");
        } catch (e) {
            toast(e.message, "error");
        }
    }

    function closeDetailModal() {
        currentDetail = null;
        detailSecretVisible = false;
        document.getElementById("detail-modal").classList.remove("show");
    }

    function toggleDetailSecret() {
        if (!currentDetail) {
            return;
        }
        detailSecretVisible = !detailSecretVisible;
        document.getElementById("detail-secret").textContent = detailSecretVisible ? (currentDetail.secret || "") : MASKED_SECRET;
        document.getElementById("detail-secret-toggle").textContent = detailSecretVisible ? "隐藏密码" : "显示密码";
    }

    async function copyDetailSecret() {
        if (!currentDetail) {
            return;
        }
        try {
            await copyText(currentDetail.secret || "");
            toast("密码已复制");
        } catch (e) {
            toast(e.message, "error");
        }
    }

    async function delEntry(id) {
        const confirmed = await confirmDialog({
            title: "删除密码条目",
            message: "删除后将无法恢复，是否继续？",
            confirmText: "确认删除"
        });
        if (!confirmed) {
            return;
        }
        try {
            await api("/api/passwords/" + id, { method: "DELETE" });
            detailCache.delete(id);
            visibleSecrets.delete(id);
            toast("已删除");
            await loadList();
        } catch (e) {
            toast(e.message, "error");
        }
    }

    document.addEventListener("DOMContentLoaded", () => {
        loadList();
    });
</script>
</body>
</html>
