<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="renderer" content="webkit"/>
    <meta name="google" content="notranslate"/>
    <title th:text="${title}">EcoVault</title>
    <link rel="icon" th:href="@{/favicon.ico}" sizes="any"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <script defer th:src="@{/js/app.js}"></script>
</head>
<body>
<!-- 顶部导航栏 (登录后页面使用) -->
<header th:fragment="navbar" class="navbar">
    <div class="brand">🔐 EcoVault</div>
    <nav id="main-nav">
        <a th:href="@{/dashboard}" data-page="dashboard">控制台</a>
        <a th:href="@{/passwords}" data-page="passwords">密码管理</a>
        <div class="nav-dropdown" data-group="finance">
            <span class="nav-dropdown-toggle">财务管理 ▾</span>
            <div class="nav-dropdown-menu">
                <a th:href="@{/finance}" data-page="salary">工资管理</a>
                <a th:href="@{/finance/ledger}" data-page="ledger">收入支出管理</a>
            </div>
        </div>
        <a th:href="@{/profile}" data-page="profile">个人中心</a>
        <div class="nav-dropdown" data-group="admin" id="nav-admin" style="display:none">
            <span class="nav-dropdown-toggle">后台管理 ▾</span>
            <div class="nav-dropdown-menu">
                <a th:href="@{/admin}">后台首页</a>
                <a th:href="@{/admin/users}" data-page="users">用户管理</a>
                <a th:href="@{/admin/logs}" data-page="logs">日志管理</a>
                <a th:href="@{/admin/roles}" data-page="roles">角色管理</a>
            </div>
        </div>
    </nav>
    <div style="display:flex; gap:10px; align-items:center">
        <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
        <button class="btn btn-sm secondary" onclick="logout()">退出</button>
    </div>
</header>
</body>
</html>
