<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:replace="~{fragments/common :: head('管理后台 - EcoVault')}"></head>
<body>
<header th:replace="~{fragments/common :: navbar}"></header>
<div class="container">
    <div class="glass card">
        <h2>🛠️ 管理后台</h2>
        <p class="muted">仅管理员可见：查看系统构建信息与运行状态；用户创建与维护请进入「用户管理」页面。</p>
    </div>

    <div class="grid two" style="margin-top:20px">
        <div class="glass card">
            <h3>📦 构建信息</h3>
            <table class="table"><tbody id="build-info"></tbody></table>
        </div>
        <div class="glass card">
            <h3>❤️ 系统状态</h3>
            <table class="table"><tbody id="health-info"></tbody></table>
        </div>
    </div>

    <div class="glass card">
        <h3>🧭 Actuator 端点概览</h3>
        <p class="muted">仅展示当前已暴露且管理员可访问的端点，便于快速定位监控入口。</p>
        <table class="table"><tbody id="actuator-endpoints"></tbody></table>
    </div>
</div>
<script>
    async function loadBuild() {
        const info = await api("/api/admin/build-info");
        document.getElementById("build-info").innerHTML = Object.entries(info)
            .map(([k, v]) => `<tr><th>${escapeHtml(k)}</th><td>${escapeHtml(v === null ? "" : v)}</td></tr>`)
            .join("");
    }

    async function loadHealth() {
        try {
            const resp = await fetch("/actuator/health", { credentials: "same-origin" });
            const h = await resp.json();
            const rows = [ ["状态", h.status] ];
            if (h.components) {
                Object.entries(h.components).forEach(([k, v]) => rows.push([k, v.status]));
            }
            document.getElementById("health-info").innerHTML = rows
                .map(([k, v]) => `<tr><th>${escapeHtml(k)}</th><td>${escapeHtml(v)}</td></tr>`)
                .join("");
        } catch (e) {
            document.getElementById("health-info").innerHTML = '<tr><td class="muted">无法获取</td></tr>';
        }
    }

    async function loadActuatorEndpoints() {
        try {
            const endpoints = await api("/api/admin/actuator-endpoints");
            if (!endpoints.length) {
                document.getElementById("actuator-endpoints").innerHTML = '<tr><td class="muted">暂无可展示端点</td></tr>';
                return;
            }
            document.getElementById("actuator-endpoints").innerHTML = endpoints
                .map(({ name, path }) => {
                    return `<tr><th>${escapeHtml(name)}</th><td><a href="${escapeHtml(path)}" target="_blank" rel="noreferrer noopener">${escapeHtml(path)}</a></td></tr>`;
                })
                .join("");
        } catch (e) {
            document.getElementById("actuator-endpoints").innerHTML = '<tr><td class="muted">无法获取</td></tr>';
        }
    }

    document.addEventListener("DOMContentLoaded", async () => {
        try {
            await Promise.all([loadBuild(), loadHealth(), loadActuatorEndpoints()]);
        } catch (e) {
            toast(e.message, "error");
        }
    });
</script>
</body>
</html>
