<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:replace="~{fragments/common :: head('控制台 - EcoVault')}"></head>
<body>
<header th:replace="~{fragments/common :: navbar}"></header>
<div class="container">
    <div class="glass card">
        <h2 id="greeting">控制台</h2>
        <p class="muted">欢迎使用 EcoVault，选择下方功能开始管理你的数据。</p>
    </div>
    <div class="grid">
        <a class="glass feature" th:href="@{/passwords}">
            <h3>🔑 密码管理</h3>
            <p class="muted">集中管理账号密码，加密存储。</p>
        </a>
        <a class="glass feature" th:href="@{/finance}">
            <h3>💰 财务管理</h3>
            <p class="muted">工资录入与统计分析图表。</p>
        </a>
        <a class="glass feature" th:href="@{/logs}">
            <h3>📋 操作日志</h3>
            <p class="muted">查看你的操作审计记录。</p>
        </a>
        <a class="glass feature" th:href="@{/profile}">
            <h3>👤 个人中心</h3>
            <p class="muted">修改资料与密码。</p>
        </a>
    </div>
</div>
<script>
    document.addEventListener("DOMContentLoaded", async () => {
        try {
            const me = await api("/api/auth/me");
            document.getElementById("greeting").textContent = "你好，" + (me.nickname || me.username) + " 👋";
            if (me.role === "ADMIN") {
                document.getElementById("nav-admin").style.display = "inline-block";
            }
        } catch (e) {
            // 未登录会被拦截跳转
        }
    });
</script>
</body>
</html>
