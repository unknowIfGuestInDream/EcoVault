<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:replace="~{fragments/common :: head('控制台 - EcoVault')}"></head>
<body>
<header th:replace="~{fragments/common :: navbar}"></header>
<div class="container">
    <div class="glass card">
        <h2 id="greeting">控制台</h2>
        <p class="muted">欢迎使用 EcoVault，选择下方功能开始管理你的数据。</p>
    </div>
    <div class="grid" id="feature-grid">
        <a class="glass feature" data-page="passwords" th:href="@{/passwords}">
            <h3>🔑 密码管理</h3>
            <p class="muted">集中管理账号密码，加密存储。</p>
        </a>
        <a class="glass feature" data-page="salary" th:href="@{/finance}">
            <h3>💰 工资管理</h3>
            <p class="muted">工资录入与统计分析图表。</p>
        </a>
        <a class="glass feature" data-page="ledger" th:href="@{/finance/ledger}">
            <h3>📒 收入支出管理</h3>
            <p class="muted">记录每日收支，多标签分类查询。</p>
        </a>
        <a class="glass feature" data-page="profile" th:href="@{/profile}">
            <h3>👤 个人中心</h3>
            <p class="muted">修改资料与密码。</p>
        </a>
        <a class="glass feature" data-page="users" th:href="@{/admin/users}">
            <h3>👥 用户管理</h3>
            <p class="muted">创建、编辑与停用用户账号。</p>
        </a>
        <a class="glass feature" data-page="logs" th:href="@{/admin/logs}">
            <h3>📋 日志管理</h3>
            <p class="muted">查看、查询与维护操作审计日志。</p>
        </a>
        <a class="glass feature" data-page="roles" th:href="@{/admin/roles}">
            <h3>🎭 角色管理</h3>
            <p class="muted">为角色分配可访问的页面。</p>
        </a>
    </div>
</div>
<script>
    document.addEventListener("DOMContentLoaded", async () => {
        try {
            const me = await api("/api/auth/me");
            document.getElementById("greeting").textContent = "你好，" + (me.nickname || me.username) + " 👋";
            const pages = new Set(me.pages || []);
            document.querySelectorAll("#feature-grid [data-page]").forEach(el => {
                const key = el.getAttribute("data-page");
                if (key === "profile") {
                    return;
                }
                el.style.display = pages.has(key) ? "" : "none";
            });
        } catch (e) {
            // 未登录会被拦截跳转
        }
    });
</script>
</body>
</html>
