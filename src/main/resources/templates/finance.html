<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:replace="~{fragments/common :: head('财务管理 - EcoVault')}"></head>
<body>
<header th:replace="~{fragments/common :: navbar}"></header>
<div class="container">
    <div class="glass card">
        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px">
            <h2>💰 工资管理</h2>
            <div class="row">
                <input id="year" type="number" placeholder="年份筛选" style="width:120px" oninput="reload()"/>
                <button class="btn" onclick="openModal()">➕ 录入</button>
                <button class="btn secondary" onclick="exportCsv()">⬇ 导出CSV</button>
            </div>
        </div>
    </div>

    <div class="grid" id="stat-cards" style="margin-top:20px"></div>

    <div class="grid two" style="margin-top:20px">
        <div class="glass card">
            <h3>月度趋势</h3>
            <canvas id="trendChart" height="200"></canvas>
        </div>
        <div class="glass card">
            <h3>发放项构成</h3>
            <canvas id="compChart" height="200"></canvas>
        </div>
    </div>

    <div class="glass card" style="margin-top:20px">
        <h3>扣除项构成</h3>
        <canvas id="deductionChart" height="120"></canvas>
    </div>

    <div class="glass card" style="margin-top:20px">
        <h3>明细</h3>
        <div style="overflow-x:auto">
            <table class="table">
                <thead>
                <tr><th>年月</th><th>应发工资</th><th>扣除合计</th><th>税前工资</th><th>所得税</th><th>税后工资</th><th>大病医疗</th><th>采暖补贴</th><th>实发金额</th><th>操作</th></tr>
                </thead>
                <tbody id="salary-body"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- 录入弹窗 -->
<div class="modal-backdrop" id="modal">
    <div class="glass modal" style="max-width:640px">
        <div class="modal-header">
            <h3 id="modal-title">录入工资</h3>
            <button class="icon-btn modal-close" onclick="closeModal()" type="button" aria-label="关闭">✕</button>
        </div>
        <input type="hidden" id="rec-id"/>
        <div class="row">
            <div style="flex:1"><label>年份 *</label><input id="f-year" type="number"/></div>
            <div style="flex:1"><label>月份（年终奖可留空）</label><input id="f-month" type="number" min="1" max="12" placeholder="1-12，年终奖可留空"/></div>
        </div>
        <label style="display:flex; align-items:center; gap:8px; margin-top:8px">
            <input id="f-annual" type="checkbox" style="width:auto" onchange="toggleAnnual()"/> 年终奖 (按年录入，无需月份)
        </label>

        <h4 style="margin:16px 0 4px">发放项</h4>
        <div class="grid two">
            <div><label>基本工资</label><input id="f-baseSalary" type="number" step="0.01"/></div>
            <div><label>绩效工资</label><input id="f-performanceSalary" type="number" step="0.01"/></div>
            <div><label>租房补助</label><input id="f-housingAllowance" type="number" step="0.01"/></div>
            <div><label>伙食补助</label><input id="f-mealAllowance" type="number" step="0.01"/></div>
            <div><label>交通补贴</label><input id="f-transportAllowance" type="number" step="0.01"/></div>
            <div><label>加班费</label><input id="f-overtimePay" type="number" step="0.01"/></div>
            <div><label>加班补助</label><input id="f-overtimeAllowance" type="number" step="0.01"/></div>
            <div><label>奖金</label><input id="f-bonus" type="number" step="0.01"/></div>
        </div>

        <h4 style="margin:16px 0 4px">缴费基数</h4>
        <div class="grid two">
            <div><label>医疗保险缴费基数</label><input id="f-medicalBase" type="number" step="0.01"/></div>
            <div><label>养老失业缴费基数</label><input id="f-pensionUnemploymentBase" type="number" step="0.01"/></div>
            <div><label>公积金缴费基数</label><input id="f-housingFundBase" type="number" step="0.01"/></div>
        </div>

        <h4 style="margin:16px 0 4px">扣除项</h4>
        <div class="grid two">
            <div><label>医疗</label><input id="f-medicalDeduction" type="number" step="0.01"/></div>
            <div><label>养老</label><input id="f-pensionDeduction" type="number" step="0.01"/></div>
            <div><label>失业</label><input id="f-unemploymentDeduction" type="number" step="0.01"/></div>
            <div><label>公积金</label><input id="f-housingFundDeduction" type="number" step="0.01"/></div>
        </div>

        <h4 style="margin:16px 0 4px">到账信息</h4>
        <div class="grid two">
            <div><label>税前工资</label><input id="f-preTaxSalary" type="number" step="0.01" readonly/></div>
            <div><label>所得税</label><input id="f-incomeTax" type="number" step="0.01"/></div>
            <div><label>税后工资</label><input id="f-afterTaxSalary" type="number" step="0.01" readonly/></div>
            <div><label>大病医疗</label><input id="f-seriousIllnessMedical" type="number" step="0.01"/></div>
            <div><label>采暖补贴</label><input id="f-heatingAllowance" type="number" step="0.01"/></div>
            <div><label>实发金额</label><input id="f-netPay" type="number" step="0.01"/></div>
        </div>

        <label style="margin-top:12px">备注</label><input id="f-remark"/>
        <div style="display:flex; gap:10px; margin-top:20px">
            <button class="btn" style="flex:1" onclick="saveRecord()">保存</button>
            <button class="btn secondary" style="flex:1" onclick="closeModal()">取消</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
    let trendChart, compChart, deductionChart;

    // 金额录入字段 (与后端 SalaryRequest 字段同名)
    const GROSS_FIELDS = [
        "baseSalary", "performanceSalary", "housingAllowance", "mealAllowance",
        "transportAllowance", "overtimePay", "overtimeAllowance", "bonus"
    ];

    const DEDUCTION_FIELDS = [
        "medicalDeduction", "pensionDeduction", "unemploymentDeduction", "housingFundDeduction"
    ];

    const AMOUNT_FIELDS = [
        ...GROSS_FIELDS,
        "medicalBase", "pensionUnemploymentBase", "housingFundBase",
        ...DEDUCTION_FIELDS,
        "incomeTax", "seriousIllnessMedical", "heatingAllowance", "netPay"
    ];

    function yearParam() {
        const y = document.getElementById("year").value.trim();
        return y ? "?year=" + encodeURIComponent(y) : "";
    }

    async function reload() {
        await Promise.all([loadList(), loadStats()]);
    }

    function monthText(r) {
        return r.annualBonus ? "年终奖" : `${r.year}-${String(r.month).padStart(2, "0")}`;
    }

    function fieldCents(field) {
        const raw = document.getElementById("f-" + field).value.trim();
        if (!raw) {
            return 0;
        }
        const value = Number(raw);
        return Number.isFinite(value) ? Number.parseInt(value.toFixed(2).replace(".", ""), 10) : 0;
    }

    function formatAmount(cents) {
        return (cents / 100).toFixed(2);
    }

    function refreshDerivedAmounts() {
        const gross = GROSS_FIELDS.reduce((sum, field) => sum + fieldCents(field), 0);
        const deduction = DEDUCTION_FIELDS.reduce((sum, field) => sum + fieldCents(field), 0);
        const preTax = gross - deduction;
        const afterTax = preTax - fieldCents("incomeTax");
        document.getElementById("f-preTaxSalary").value = formatAmount(preTax);
        document.getElementById("f-afterTaxSalary").value = formatAmount(afterTax);
    }

    async function loadList() {
        const data = await api("/api/finance/salaries" + yearParam());
        const body = document.getElementById("salary-body");
        if (!data.length) {
            body.innerHTML = '<tr><td colspan="10" class="muted">暂无数据</td></tr>';
            return;
        }
        body.innerHTML = data.map(r => `
            <tr>
                <td>${monthText(r)}</td>
                <td>${r.grossPay}</td><td>${r.totalDeduction}</td>
                <td>${r.preTaxSalary}</td><td>${r.incomeTax}</td><td>${r.afterTaxSalary}</td>
                <td>${r.seriousIllnessMedical}</td><td>${r.heatingAllowance}</td><td>${r.netPay}</td>
                <td>
                    <button class="btn btn-sm secondary" onclick='editRecord(${JSON.stringify(r)})'>编辑</button>
                    <button class="btn btn-sm danger" onclick="delRecord(${r.id})">删除</button>
                </td>
            </tr>`).join("");
    }

    async function loadStats() {
        const s = await api("/api/finance/salaries/statistics" + yearParam());
        document.getElementById("stat-cards").innerHTML = `
            <div class="glass stat"><span class="muted">实发合计</span><strong>${s.totalNet}</strong></div>
            <div class="glass stat"><span class="muted">月均实发</span><strong>${s.averageNet}</strong></div>
            <div class="glass stat"><span class="muted">最高实发</span><strong>${s.maxNet}</strong></div>
            <div class="glass stat"><span class="muted">最低实发</span><strong>${s.minNet}</strong></div>
            <div class="glass stat"><span class="muted">奖金合计</span><strong>${s.totalBonus}</strong></div>
            <div class="glass stat"><span class="muted">年终奖合计</span><strong>${s.totalAnnualBonus}</strong></div>`;

        const labels = s.monthlyTrend.map(p => p.label);
        const nets = s.monthlyTrend.map(p => Number(p.net));
        const gross = s.monthlyTrend.map(p => Number(p.gross));
        if (trendChart) trendChart.destroy();
        trendChart = new Chart(document.getElementById("trendChart"), {
            type: "line",
            data: {
                labels,
                datasets: [
                    { label: "实发", data: nets, borderColor: "#6366f1", tension: 0.3, fill: false },
                    { label: "应发", data: gross, borderColor: "#22c55e", tension: 0.3, fill: false }
                ]
            },
            options: { responsive: true, plugins: { legend: { position: "bottom" } } }
        });

        const c = s.composition;
        if (compChart) compChart.destroy();
        compChart = new Chart(document.getElementById("compChart"), {
            type: "doughnut",
            data: {
                labels: ["基本工资", "绩效工资", "租房补助", "伙食补助", "交通补贴", "加班费", "加班补助", "奖金"],
                datasets: [{
                    data: [
                        Number(c.baseSalary), Number(c.performanceSalary), Number(c.housingAllowance),
                        Number(c.mealAllowance), Number(c.transportAllowance), Number(c.overtimePay),
                        Number(c.overtimeAllowance), Number(c.bonus)
                    ],
                    backgroundColor: ["#6366f1", "#8b5cf6", "#0ea5e9", "#14b8a6", "#22c55e", "#f59e0b", "#f97316", "#ef4444"]
                }]
            },
            options: { responsive: true, plugins: { legend: { position: "bottom" } } }
        });

        const d = s.deductionComposition;
        if (deductionChart) deductionChart.destroy();
        deductionChart = new Chart(document.getElementById("deductionChart"), {
            type: "bar",
            data: {
                labels: ["医疗", "养老", "失业", "公积金", "所得税"],
                datasets: [{
                    label: "扣除合计",
                    data: [Number(d.medical), Number(d.pension), Number(d.unemployment), Number(d.housingFund), Number(d.incomeTax)],
                    backgroundColor: "#6366f1"
                }]
            },
            options: { responsive: true, plugins: { legend: { display: false } } }
        });
    }

    function toggleAnnual() {
        const annual = document.getElementById("f-annual").checked;
        const monthInput = document.getElementById("f-month");
        monthInput.disabled = annual;
        if (annual) {
            monthInput.value = "";
        }
    }

    function clearForm() {
        document.getElementById("rec-id").value = "";
        document.getElementById("f-year").value = "";
        document.getElementById("f-month").value = "";
        document.getElementById("f-annual").checked = false;
        document.getElementById("f-remark").value = "";
        AMOUNT_FIELDS.forEach(f => document.getElementById("f-" + f).value = "");
        refreshDerivedAmounts();
        toggleAnnual();
    }

    function openModal() {
        document.getElementById("modal-title").textContent = "录入工资";
        clearForm();
        document.getElementById("modal").classList.add("show");
    }

    function editRecord(r) {
        document.getElementById("modal-title").textContent = "编辑工资";
        clearForm();
        document.getElementById("rec-id").value = r.id;
        document.getElementById("f-year").value = r.year;
        document.getElementById("f-annual").checked = r.annualBonus;
        document.getElementById("f-month").value = r.annualBonus ? "" : r.month;
        AMOUNT_FIELDS.forEach(f => document.getElementById("f-" + f).value = r[f]);
        refreshDerivedAmounts();
        document.getElementById("f-remark").value = r.remark || "";
        toggleAnnual();
        document.getElementById("modal").classList.add("show");
    }

    function closeModal() {
        document.getElementById("modal").classList.remove("show");
    }

    function numOrZero(field) {
        const v = document.getElementById("f-" + field).value;
        return v === "" ? 0 : Number(v);
    }

    async function saveRecord() {
        const id = document.getElementById("rec-id").value;
        const annual = document.getElementById("f-annual").checked;
        const year = Number(document.getElementById("f-year").value);
        const month = annual ? 0 : Number(document.getElementById("f-month").value);
        if (!year) {
            toast("年份必填", "error");
            return;
        }
        if (!annual && !month) {
            toast("月份必填 (或勾选年终奖)", "error");
            return;
        }
        const payload = { year, month, remark: document.getElementById("f-remark").value.trim() };
        AMOUNT_FIELDS.forEach(f => payload[f] = numOrZero(f));
        try {
            if (id) {
                await api("/api/finance/salaries/" + id, { method: "PUT", body: JSON.stringify(payload) });
            } else {
                await api("/api/finance/salaries", { method: "POST", body: JSON.stringify(payload) });
            }
            toast("保存成功");
            closeModal();
            reload();
        } catch (e) {
            toast(e.message, "error");
        }
    }

    async function delRecord(id) {
        if (!confirm("确认删除该记录？")) return;
        try {
            await api("/api/finance/salaries/" + id, { method: "DELETE" });
            toast("已删除");
            reload();
        } catch (e) {
            toast(e.message, "error");
        }
    }

    function exportCsv() {
        window.location.href = "/api/finance/salaries/export" + yearParam();
    }

    document.addEventListener("DOMContentLoaded", () => {
        [...GROSS_FIELDS, ...DEDUCTION_FIELDS, "incomeTax"].forEach(field => {
            document.getElementById("f-" + field).addEventListener("input", refreshDerivedAmounts);
        });
        refreshDerivedAmounts();
        reload();
    });
</script>
</body>
</html>
