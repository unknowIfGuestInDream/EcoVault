<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:replace="~{fragments/common :: head('财务管理 - EcoVault')}"></head>
<body>
<header th:replace="~{fragments/common :: navbar}"></header>
<div class="container">
    <div class="glass card">
        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px">
            <h2>💰 工资管理</h2>
            <div class="row">
                <input id="year" type="number" placeholder="年份筛选" style="width:120px" oninput="reload()"/>
                <button class="btn" onclick="openModal()">➕ 录入</button>
                <button class="btn secondary" onclick="exportCsv()">⬇ 导出CSV</button>
            </div>
        </div>
    </div>

    <div class="grid" id="stat-cards" style="margin-top:20px"></div>

    <div class="grid two" style="margin-top:20px">
        <div class="glass card">
            <h3>月度趋势</h3>
            <canvas id="trendChart" height="200"></canvas>
        </div>
        <div class="glass card">
            <h3>收入构成</h3>
            <canvas id="compChart" height="200"></canvas>
        </div>
    </div>

    <div class="glass card" style="margin-top:20px">
        <h3>明细</h3>
        <div style="overflow-x:auto">
            <table class="table">
                <thead>
                <tr><th>年月</th><th>基本工资</th><th>奖金</th><th>补贴</th><th>扣款</th><th>税前</th><th>实发</th><th>操作</th></tr>
                </thead>
                <tbody id="salary-body"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- 录入弹窗 -->
<div class="modal-backdrop" id="modal">
    <div class="glass modal">
        <h3 id="modal-title">录入工资</h3>
        <input type="hidden" id="rec-id"/>
        <div class="row">
            <div style="flex:1"><label>年份 *</label><input id="f-year" type="number"/></div>
            <div style="flex:1"><label>月份 *</label><input id="f-month" type="number" min="1" max="12"/></div>
        </div>
        <label>基本工资</label><input id="f-base" type="number" step="0.01"/>
        <label>奖金</label><input id="f-bonus" type="number" step="0.01"/>
        <label>补贴</label><input id="f-allowance" type="number" step="0.01"/>
        <label>扣款</label><input id="f-deduction" type="number" step="0.01"/>
        <label>备注</label><input id="f-remark"/>
        <div style="display:flex; gap:10px; margin-top:20px">
            <button class="btn" style="flex:1" onclick="saveRecord()">保存</button>
            <button class="btn secondary" style="flex:1" onclick="closeModal()">取消</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
    let trendChart, compChart;

    function yearParam() {
        const y = document.getElementById("year").value.trim();
        return y ? "?year=" + encodeURIComponent(y) : "";
    }

    async function reload() {
        await Promise.all([loadList(), loadStats()]);
    }

    async function loadList() {
        const data = await api("/api/finance/salaries" + yearParam());
        const body = document.getElementById("salary-body");
        if (!data.length) {
            body.innerHTML = '<tr><td colspan="8" class="muted">暂无数据</td></tr>';
            return;
        }
        body.innerHTML = data.map(r => `
            <tr>
                <td>${r.year}-${String(r.month).padStart(2, "0")}</td>
                <td>${r.baseSalary}</td><td>${r.bonus}</td><td>${r.allowance}</td>
                <td>${r.deduction}</td><td>${r.gross}</td><td>${r.net}</td>
                <td>
                    <button class="btn btn-sm secondary" onclick='editRecord(${JSON.stringify(r)})'>编辑</button>
                    <button class="btn btn-sm danger" onclick="delRecord(${r.id})">删除</button>
                </td>
            </tr>`).join("");
    }

    async function loadStats() {
        const s = await api("/api/finance/salaries/statistics" + yearParam());
        document.getElementById("stat-cards").innerHTML = `
            <div class="glass stat"><span class="muted">实发合计</span><strong>${s.totalNet}</strong></div>
            <div class="glass stat"><span class="muted">月均实发</span><strong>${s.averageNet}</strong></div>
            <div class="glass stat"><span class="muted">最高实发</span><strong>${s.maxNet}</strong></div>
            <div class="glass stat"><span class="muted">最低实发</span><strong>${s.minNet}</strong></div>
            <div class="glass stat"><span class="muted">奖金合计</span><strong>${s.totalBonus}</strong></div>`;

        const labels = s.monthlyTrend.map(p => p.label);
        const nets = s.monthlyTrend.map(p => Number(p.net));
        const gross = s.monthlyTrend.map(p => Number(p.gross));
        if (trendChart) trendChart.destroy();
        trendChart = new Chart(document.getElementById("trendChart"), {
            type: "line",
            data: {
                labels,
                datasets: [
                    { label: "实发", data: nets, borderColor: "#6366f1", tension: 0.3, fill: false },
                    { label: "税前", data: gross, borderColor: "#22c55e", tension: 0.3, fill: false }
                ]
            },
            options: { responsive: true, plugins: { legend: { position: "bottom" } } }
        });

        if (compChart) compChart.destroy();
        compChart = new Chart(document.getElementById("compChart"), {
            type: "doughnut",
            data: {
                labels: ["基本工资", "奖金", "补贴"],
                datasets: [{
                    data: [Number(s.composition.baseSalary), Number(s.composition.bonus), Number(s.composition.allowance)],
                    backgroundColor: ["#6366f1", "#f59e0b", "#22c55e"]
                }]
            },
            options: { responsive: true, plugins: { legend: { position: "bottom" } } }
        });
    }

    function openModal() {
        document.getElementById("modal-title").textContent = "录入工资";
        ["rec-id", "f-year", "f-month", "f-base", "f-bonus", "f-allowance", "f-deduction", "f-remark"]
            .forEach(id => document.getElementById(id).value = "");
        document.getElementById("modal").classList.add("show");
    }

    function editRecord(r) {
        document.getElementById("modal-title").textContent = "编辑工资";
        document.getElementById("rec-id").value = r.id;
        document.getElementById("f-year").value = r.year;
        document.getElementById("f-month").value = r.month;
        document.getElementById("f-base").value = r.baseSalary;
        document.getElementById("f-bonus").value = r.bonus;
        document.getElementById("f-allowance").value = r.allowance;
        document.getElementById("f-deduction").value = r.deduction;
        document.getElementById("f-remark").value = r.remark || "";
        document.getElementById("modal").classList.add("show");
    }

    function closeModal() {
        document.getElementById("modal").classList.remove("show");
    }

    function numOrZero(id) {
        const v = document.getElementById(id).value;
        return v === "" ? 0 : Number(v);
    }

    async function saveRecord() {
        const id = document.getElementById("rec-id").value;
        const payload = {
            year: Number(document.getElementById("f-year").value),
            month: Number(document.getElementById("f-month").value),
            baseSalary: numOrZero("f-base"),
            bonus: numOrZero("f-bonus"),
            allowance: numOrZero("f-allowance"),
            deduction: numOrZero("f-deduction"),
            remark: document.getElementById("f-remark").value.trim()
        };
        if (!payload.year || !payload.month) {
            toast("年份和月份必填", "error");
            return;
        }
        try {
            if (id) {
                await api("/api/finance/salaries/" + id, { method: "PUT", body: JSON.stringify(payload) });
            } else {
                await api("/api/finance/salaries", { method: "POST", body: JSON.stringify(payload) });
            }
            toast("保存成功");
            closeModal();
            reload();
        } catch (e) {
            toast(e.message, "error");
        }
    }

    async function delRecord(id) {
        if (!confirm("确认删除该记录？")) return;
        try {
            await api("/api/finance/salaries/" + id, { method: "DELETE" });
            toast("已删除");
            reload();
        } catch (e) {
            toast(e.message, "error");
        }
    }

    function exportCsv() {
        window.location.href = "/api/finance/salaries/export" + yearParam();
    }

    document.addEventListener("DOMContentLoaded", () => {
        reload();
    });
</script>
</body>
</html>
