# 测试专用配置：使用独立的 SQLite 数据库文件，避免污染开发数据
spring:
  datasource:
    url: jdbc:sqlite:${ECOVAULT_DB_PATH:target/test-ecovault.db}
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
    open-in-view: false

ecovault:
  security:
    jwt-secret: dGVzdC1zZWNyZXQta2V5LWZvci1lY292YXVsdC11bml0LXRlc3Rz
    jwt-expiration-ms: 7200000
    max-devices: 1
  crypto:
    secret: ecovault-test-aes-secret-32bytes!

logging:
  level:
    org.hibernate.SQL: warn
